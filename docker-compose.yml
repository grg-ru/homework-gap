networks:
  monitoring:
  cms:

volumes:
  mysql_data:
  wordpress_data:
  prometheus_data:
  victoria_data:
  grafana_data:

services:
  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cms

  wordpress:
    image: wordpress:php8.2-fpm
    container_name: php-fpm
    restart: always
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    volumes:
      - wordpress_data:/var/www/html
      - ./php-fpm/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    networks:
      - cms
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - wordpress_data:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cms
    depends_on:
      - wordpress

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: always
    network_mode: host
    pid: host
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'

  mysqld_exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld_exporter
    restart: always
    command:
      - "--config.my-cnf=/etc/mysql/.my.cnf"
    volumes:
      - ./mysql/.my.cnf:/etc/mysql/.my.cnf:ro
    ports:
      - "9104:9104"
    networks:
      - cms
      - monitoring
    depends_on:
      - db

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    restart: always
    command:
      - '-nginx.scrape-uri=http://nginx:80/nginx_status'
    networks:
      - cms
      - monitoring
    depends_on:
      - nginx

  php_fpm_exporter:
    image: hipages/php-fpm_exporter:latest
    container_name: php_fpm_exporter
    restart: always
    command:
      - 'server'
      - '--phpfpm.scrape-uri=tcp://wordpress:9000/status'
      - '--web.listen-address=:9253'
    networks:
      - cms
      - monitoring
    depends_on:
      - wordpress

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox_exporter
    restart: always
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring
      - cms
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.listen-address=:9090'
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - cms
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - node_exporter
      - mysqld_exporter
      - nginx_exporter
      - php_fpm_exporter
      - blackbox_exporter

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    restart: always
    volumes:
      - victoria_data:/victoria-metrics-data
    command:
      - '--storageDataPath=/victoria-metrics-data'
      - '--httpListenAddr=:8428'
      - '--retentionPeriod=30d'
    ports:
      - "8428:8428"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards-definition:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - victoriametrics
