route:
  receiver: 'telegram'
  routes:
    - match:
        severity: critical
      receiver: 'telegram'
    - match:
        severity: warning
      receiver: 'debug'

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: '1234567890:ABCdefGhIJKlmNoPQRsTUVwxyZ'
        chat_id: -100123456789

  - name: 'debug'
    webhook_configs:
      - url: 'http://localhost:9999'
